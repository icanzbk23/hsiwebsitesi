<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;
  --black:#0A0A0A;--dark:#111111;--dark2:#1A1A1A;--dark3:#222222;
  --gray:#888888;--white:#FFFFFF;
  --font-display:'Playfair Display',serif;--font-body:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--font-body);line-height:1.6}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(10,10,10,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.15);
  display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px}
.nav-logo{font-family:var(--font-display);font-size:22px;color:var(--gold);
  letter-spacing:2px;font-weight:700;text-decoration:none}
.nav-logo span{color:var(--white)}
.nav-links{display:flex;gap:28px}
.nav-links a{color:var(--gray);text-decoration:none;font-size:12px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;transition:color .3s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* TABS */
.tabs-wrap{padding-top:64px}
.tabs-header{display:flex;border-bottom:1px solid rgba(201,168,76,.12);
  background:var(--dark);padding:0 5%;
  position:sticky;top:64px;z-index:100}
.tab-btn{padding:18px 28px;font-size:12px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--gray);cursor:pointer;border:none;
  background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .3s;font-family:var(--font-body)}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.soon-badge{background:rgba(201,168,76,.12);color:var(--gold);font-size:9px;
  letter-spacing:1px;padding:3px 9px;border-radius:100px;
  border:1px solid rgba(201,168,76,.25);margin-left:8px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* SECTION HEADER */
.sec-head{padding:48px 5% 0}
.sec-head small{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}
.sec-head h2{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);
  font-weight:700;color:var(--white);margin-top:8px}
.gold-line{width:56px;height:2px;background:linear-gradient(to right,var(--gold),transparent);
  margin:20px 0 32px}

/* SEARCH + FILTER */
.search-filter-wrap{padding:0 5% 32px;display:flex;flex-direction:column;gap:16px}
.search-bar-wrap{position:relative;max-width:380px}
.search-bar{width:100%;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.18);
  border-radius:100px;padding:10px 20px 10px 44px;color:var(--white);
  font-family:var(--font-body);font-size:13px;outline:none;
  transition:border-color .3s, background .3s}
.search-bar::placeholder{color:var(--gray)}
.search-bar:focus{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.07)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;pointer-events:none;opacity:.5}
.search-icon svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filt{padding:8px 20px;border-radius:100px;border:1px solid rgba(201,168,76,.18);
  background:transparent;color:var(--gray);font-size:11px;cursor:pointer;
  transition:all .25s;font-family:var(--font-body);letter-spacing:1px;text-transform:uppercase}
.filt.active,.filt:hover{border-color:rgba(201,168,76,.5);color:var(--gold);
  background:rgba(201,168,76,.08);box-shadow:0 0 16px -4px rgba(201,168,76,.15)}

/* MEKAN GRID */
.mekan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;margin:0 5% 60px}

/* Card */
.mekan-card{
  background:var(--dark);cursor:pointer;border-radius:20px;overflow:hidden;
  display:flex;flex-direction:column;position:relative;
  border:1px solid rgba(201,168,76,.1);
  transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease, border-color .3s;
}
.mekan-card:hover{
  transform:translateY(-6px);
  box-shadow:0 24px 60px -16px rgba(0,0,0,.8), 0 0 0 1px rgba(201,168,76,.25),
             0 0 40px -20px rgba(201,168,76,.3);
  border-color:rgba(201,168,76,.25);
}
.mekan-card:hover .card-arrow{transform:translate(0,0);opacity:1}
.mekan-card:hover .card-cover img{transform:scale(1.06);filter:brightness(.72)}

/* Brand-specific glow — her mekan kendi logo renginde parlar */
[data-id="mikado"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(200,200,200,.2),0 0 40px -18px rgba(200,200,200,.22);border-color:rgba(200,200,200,.2)}
[data-id="suleymanusta"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(220,175,0,.28),0 0 40px -18px rgba(220,175,0,.32);border-color:rgba(220,175,0,.28)}
[data-id="sultansofrasi"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(145,20,55,.32),0 0 40px -18px rgba(145,20,55,.36);border-color:rgba(145,20,55,.3)}
[data-id="harveyburger"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(210,28,18,.32),0 0 40px -18px rgba(210,28,18,.36);border-color:rgba(210,28,18,.3)}
[data-id="sutlukavurma"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(55,135,215,.3),0 0 40px -18px rgba(55,135,215,.34);border-color:rgba(55,135,215,.28)}
[data-id="egedoner"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(115,72,200,.3),0 0 40px -18px rgba(115,72,200,.34);border-color:rgba(115,72,200,.28)}
[data-id="kubankuruyemis"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(130,15,40,.3),0 0 40px -18px rgba(130,15,40,.34);border-color:rgba(130,15,40,.28)}
[data-id="isteciftlik"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(245,135,0,.3),0 0 40px -18px rgba(245,135,0,.34);border-color:rgba(245,135,0,.28)}
[data-id="sezaiusta"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(200,18,18,.3),0 0 40px -18px rgba(200,18,18,.34);border-color:rgba(200,18,18,.28)}
[data-id="sinanozdemir"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(75,148,75,.26),0 0 40px -18px rgba(75,148,75,.3);border-color:rgba(75,148,75,.24)}
[data-id="mustadoner"]:hover{box-shadow:0 24px 60px -16px rgba(0,0,0,.8),0 0 0 1px rgba(230,195,0,.3),0 0 40px -18px rgba(230,195,0,.34);border-color:rgba(230,195,0,.28)}

/* Cover */
.card-cover{aspect-ratio:16/10;position:relative;overflow:hidden;background:var(--dark3)}
.card-cover img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .45s cubic-bezier(.16,1,.3,1), filter .3s ease;filter:brightness(.85)}
.card-cover-overlay{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 50%,transparent 100%)}
.card-cover-placeholder{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:64px;background:linear-gradient(135deg,#1a1208,#0d0d0d)}
.card-arrow{
  position:absolute;top:14px;right:14px;width:36px;height:36px;
  background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;
  transform:translate(8px,-8px);opacity:0;transition:all .3s;font-size:14px;color:var(--black);z-index:3;
  box-shadow:0 4px 14px rgba(201,168,76,.5);
}
.card-viral{
  position:absolute;bottom:12px;right:12px;z-index:3;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  border:1px solid rgba(201,168,76,.4);border-radius:100px;
  font-size:10px;color:var(--gold);padding:4px 11px;letter-spacing:1px;font-weight:600;
}

/* Card body */
.card-body{padding:18px 20px 22px}
.card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}

/* Name row: small logo + name inline */
.card-name-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.card-profile-img{
  width:28px;height:28px;border-radius:50%;object-fit:cover;
  border:1.5px solid rgba(201,168,76,.45);flex-shrink:0;
  box-shadow:0 1px 6px rgba(0,0,0,.5);background:var(--dark3);
}
.card-profile-img-empty{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(201,168,76,.1);border:1.5px solid rgba(201,168,76,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:12px;color:var(--gold);font-weight:700;
}
.card-cat{
  display:inline-block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);font-weight:600;
  background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);
  padding:3px 10px;border-radius:100px;
}
.card-handle{font-size:11px;color:var(--gray);opacity:.7}
.card-name{font-family:var(--font-display);font-size:21px;font-weight:700;
  color:var(--white);line-height:1.15}
.card-loc{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:5px}
.card-loc svg{width:12px;height:12px;stroke:var(--gold);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;opacity:.7;flex-shrink:0}
.card-divider{height:1px;background:rgba(201,168,76,.07);margin:14px 0}
.card-stats{display:flex;gap:18px}
.card-stat{font-size:11px;color:rgba(201,168,76,.65);display:flex;align-items:center;gap:5px}
.card-stat svg{width:12px;height:12px;stroke:rgba(201,168,76,.65);fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card-hsi{
  margin-top:14px;font-size:10px;color:rgba(201,168,76,.5);
  display:flex;align-items:center;gap:6px;letter-spacing:1px;text-transform:uppercase;
  border-top:1px solid rgba(201,168,76,.06);padding-top:12px;
}
.card-hsi::before{content:'';width:4px;height:4px;border-radius:50%;
  background:var(--gold);opacity:.5;flex-shrink:0}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.popup-overlay.open{display:flex;animation:fadeOv .2s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.popup-box{
  background:var(--dark);border:1px solid rgba(201,168,76,.18);
  width:100%;max-width:960px;max-height:92vh;overflow-y:auto;
  animation:slideUp .38s cubic-bezier(.16,1,.3,1);border-radius:20px;position:relative;
  box-shadow:0 40px 100px -20px rgba(0,0,0,.9), 0 0 0 1px rgba(201,168,76,.1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.popup-box::-webkit-scrollbar{width:3px}
.popup-box::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:2px}
.pop-close{
  position:absolute;top:16px;right:16px;width:36px;height:36px;z-index:10;
  background:rgba(15,15,15,.8);backdrop-filter:blur(8px);
  border:1px solid rgba(201,168,76,.18);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--gold);font-size:16px;transition:all .2s;
}
.pop-close:hover{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4)}

/* Popup header */
.pop-head{padding:36px 40px 0;
  background:linear-gradient(to bottom,rgba(201,168,76,.04),transparent);
  border-bottom:1px solid rgba(201,168,76,.1)}
.pop-cat{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
  margin-bottom:10px;display:flex;align-items:center;gap:10px}
.pop-cat::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.15)}
.pop-name{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);
  font-weight:900;color:var(--white);margin-bottom:6px}
.pop-meta{display:flex;align-items:center;gap:16px;padding:14px 0 24px;flex-wrap:wrap}
.pop-meta-item{font-size:13px;color:var(--gray);display:flex;align-items:center;gap:6px}
.pop-followers{font-size:13px;color:var(--gold);font-weight:600;
  background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);
  padding:4px 14px;border-radius:100px}
.pop-ig-btn{margin-left:auto;background:transparent;border:1px solid rgba(201,168,76,.3);
  color:var(--gold);font-size:11px;padding:8px 18px;border-radius:100px;
  letter-spacing:1.5px;text-transform:uppercase;transition:all .3s;font-family:var(--font-body);
  text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.pop-ig-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold)}

/* Popup body */
.pop-body{padding:32px 40px 40px}
.reels-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gray);margin-bottom:18px}
.reels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:36px}

/* Reel kart */
.reel-card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;
  background:var(--dark2);border:1px solid rgba(201,168,76,.08);
  aspect-ratio:9/16;transition:border-color .25s, transform .25s, box-shadow .25s;
  display:block;text-decoration:none}
.reel-card:hover{border-color:rgba(201,168,76,.35);transform:scale(1.02);
  box-shadow:0 12px 32px -8px rgba(0,0,0,.7)}
.reel-card:hover .reel-play{transform:scale(1.12)}
.reel-thumb{position:absolute;inset:0}
.reel-thumb img{width:100%;height:100%;object-fit:cover;display:block;
  filter:brightness(.78);transition:filter .3s}
.reel-card:hover .reel-thumb img{filter:brightness(.6)}
.reel-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:44px;background:linear-gradient(160deg,#1a1208,#0d0d0d)}
.reel-gradient{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.08) 60%,transparent 100%)}
.reel-play{position:absolute;top:10px;right:10px;width:30px;height:30px;
  background:rgba(201,168,76,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--black);transition:transform .2s;z-index:2}
.reel-stats-top{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:3px;z-index:2}
.reel-pill{background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  border-radius:100px;padding:2px 8px;font-size:10px;color:rgba(255,255,255,.85);
  display:flex;align-items:center;gap:3px}
.reel-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 12px;z-index:2}
.reel-views{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:3px}
.reel-caption{font-size:11px;color:rgba(255,255,255,.8);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reel-bar{position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  animation:bar 2.5s ease-in-out infinite}
@keyframes bar{0%,100%{opacity:.15}50%{opacity:.6}}

/* Loading state */
.reel-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--dark2);font-size:11px;color:var(--gray);letter-spacing:1px}

/* Kart profil logosu — sağ üst köşe */
.card-logo-wrap{position:absolute;top:12px;right:12px;z-index:3;
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--gold);overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.7);background:var(--dark3)}
.card-logo{width:100%;height:100%;object-fit:cover;display:block}

/* Popup profil logosu */
.pop-logo{width:72px;height:72px;border-radius:50%;object-fit:cover;
  border:2px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,.5)}
.pop-logo-emoji{width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:36px;
  border:2px solid rgba(201,168,76,.3);background:var(--dark3)}

/* Info grid */
.pop-about{font-size:15px;color:var(--gray);line-height:1.85;margin-bottom:28px}
.pop-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.pop-info-card{background:var(--dark2);border:1px solid rgba(201,168,76,.07);
  padding:16px 20px;border-radius:12px}
.pop-info-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.pop-info-val{font-size:15px;color:var(--white);font-weight:500}
.pop-info-sub{font-size:12px;color:var(--gray);margin-top:3px}
.pop-hsi{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);
  border-radius:100px;font-size:13px;color:var(--gold)}
.pop-hsi strong{color:var(--white)}

/* YAKINDA */
.yakinda-wrap{padding:48px 5% 60px}
.yakinda-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.yakinda-card{
  background:var(--dark);border-radius:20px;padding:28px;
  display:flex;flex-direction:column;gap:18px;min-height:200px;position:relative;
  border:1px solid rgba(201,168,76,.1);overflow:hidden;
  transition:transform .3s, border-color .3s, box-shadow .3s;
}
.yakinda-card:hover{
  transform:translateY(-4px);
  border-color:rgba(201,168,76,.2);
  box-shadow:0 16px 48px -12px rgba(0,0,0,.6), 0 0 24px -12px rgba(201,168,76,.15);
}
.yakinda-card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(201,168,76,.03) 0%,transparent 60%)}
.soon-dot{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--gold);background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.2);padding:5px 14px;border-radius:100px;width:fit-content}
.soon-dot::before{content:'';width:5px;height:5px;background:var(--gold);border-radius:50%;
  animation:blink 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.yakinda-logo-row{display:flex;align-items:center;gap:16px}
.yakinda-logo{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;
  border:2px solid rgba(201,168,76,.3);filter:blur(4px);opacity:.6;
  box-shadow:0 4px 16px rgba(0,0,0,.5)}
.yakinda-logo img{width:100%;height:100%;object-fit:cover;display:block}
.yakinda-logo-empty{width:60px;height:60px;border-radius:50%;flex-shrink:0;
  background:rgba(201,168,76,.08);border:2px solid rgba(201,168,76,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:24px;color:rgba(201,168,76,.4);
  filter:blur(4px);opacity:.6}
.yakinda-name{font-family:var(--font-display);font-size:20px;font-weight:700;
  color:var(--white);margin-bottom:3px}
.yakinda-sub{font-size:10px;color:rgba(201,168,76,.5);letter-spacing:2px;text-transform:uppercase}
.yakinda-week{font-size:12px;color:var(--gray);margin-top:auto;letter-spacing:.5px}
.yakinda-lock{position:absolute;bottom:18px;right:18px;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.1);
  border-radius:8px;opacity:.4}
.yakinda-lock svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}

/* SCROLL PROGRESS */
.scroll-progress{position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(to right,var(--gold),var(--gold-light));z-index:999;transition:width .1s linear}

/* HAMBURGER */
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.nav-burger span{display:block;width:22px;height:1.5px;background:var(--gold);transition:all .3s;border-radius:2px}
.nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0}
.nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;
  background:rgba(10,10,10,.98);backdrop-filter:blur(16px);z-index:190;
  padding:24px 5% 32px;border-bottom:1px solid rgba(201,168,76,.15);
  flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--gray);text-decoration:none;font-size:13px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;padding:14px 0;
  border-bottom:1px solid rgba(201,168,76,.06);transition:color .3s}
.mobile-menu a:hover{color:var(--gold)}

/* CARD APPEAR ANIMATION */
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.mekan-card{animation:cardIn .45s ease both}

/* Responsive */
@media(max-width:640px){
  .reels-grid{gap:6px}
  .pop-body{padding:20px 16px 28px}
  .pop-head{padding:24px 16px 0}
  .pop-info-grid{grid-template-columns:1fr}
  .pop-meta{gap:10px}
  .pop-ig-btn{margin-left:0}
  nav .nav-links{display:none}
  .nav-burger{display:flex}
}
</style>
</head>
<body>

<script>
// SCROLL PROGRESS
window.addEventListener('scroll', () => {
  const p = document.getElementById('scrollProgress');
  const s = document.documentElement.scrollTop;
  const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  if (h > 0) p.style.width = (s / h * 100) + '%';
});

// HAMBURGER
function toggleMenu() {
  document.getElementById('burger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}

// CARD STAGGER
function staggerCards() {
  document.querySelectorAll('.mekan-card').forEach((c, i) => {
    c.style.animationDelay = (i * 0.06) + 's';
  });
}
// override renderCards to add stagger
const _orig = window.renderCards;
window.renderCards = function(f) { _orig(f); staggerCards(); };
</script>
